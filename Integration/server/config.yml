# screeps-launcher configuration for the integration test server.
#
# The backend's CLI must listen on 0.0.0.0 (env CLI_HOST) — the harness
# reaches it through the mapped container port; the vanilla localhost
# default would be unreachable from outside the container.

steamKey: dummy # overridden by the STEAM_KEY env var from docker-compose

mods:
  - screepsmod-mongo
  - screepsmod-auth # PINNED to 2.8.3 — see below + docker-compose entrypoint shim
  - screepsmod-admin-utils

# screepsmod-auth MUST be 2.8.3, but this launcher can't pin a mod version:
#   - inline `screepsmod-auth@2.8.3` becomes the unresolvable package.json key
#     `"screepsmod-auth@2.8.3": "*"` → yarn fails → the server crash-loops;
#   - a config `resolutions:` block is ignored (the launcher always writes its
#     own default resolutions).
# So the pin is applied by a `yarn` shim in the compose entrypoint
# (server/launcher-entrypoint.sh): it rewrites the generated package.json's
# `"screepsmod-auth": "*"` to `"2.8.3"` just before each install.
#
# Why 2.8.3: screepsmod-auth@2.9.0's auth mod fails to register its CLI hooks
# under this launcher (`setPassword`/`auth` come back undefined, so the harness's
# bootstrap signin throws "setPassword is not defined", and /api/auth/* never
# loads). 2.8.3 predates that. Drop the shim once the launcher supports pinning
# or upstream fixes 2.9.x.

bots: {}

extraPackages: {}

env:
  shared:
    MONGO_HOST: mongo
    MONGO_PORT: 27017
    REDIS_HOST: redis
    REDIS_PORT: 6379
  backend:
    CLI_HOST: 0.0.0.0
    CLI_PORT: 21026
