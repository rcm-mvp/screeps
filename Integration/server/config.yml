# screeps-launcher configuration for the integration test server.
#
# The backend's CLI must listen on 0.0.0.0 (env CLI_HOST) — the harness
# reaches it through the mapped container port; the vanilla localhost
# default would be unreachable from outside the container.

steamKey: dummy # overridden by the STEAM_KEY env var from docker-compose

mods:
  - screepsmod-mongo
  - screepsmod-auth
  - screepsmod-admin-utils

bots: {}

extraPackages: {}

env:
  shared:
    MONGO_HOST: mongo
    MONGO_PORT: 27017
    REDIS_HOST: redis
    REDIS_PORT: 6379
  backend:
    CLI_HOST: 0.0.0.0
    CLI_PORT: 21026
