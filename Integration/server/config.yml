# screeps-launcher configuration for the integration test server.
#
# The backend's CLI must listen on 0.0.0.0 (env CLI_HOST) — the harness
# reaches it through the mapped container port; the vanilla localhost
# default would be unreachable from outside the container.

steamKey: dummy # overridden by the STEAM_KEY env var from docker-compose

mods:
  - screepsmod-mongo
  # Pinned: screepsmod-auth@2.9.0 added a synchronous users.tokens collection
  # bootstrap in lib/index.js (`config.mongo.client.db()`) that crashes with
  # "Cannot read properties of undefined (reading 'db')" when paired with
  # screepsmod-mongo's client wiring in this launcher — config-manager.js
  # swallows the exception, so the whole mod (CLI hooks, /api/auth/* routes)
  # silently never loads. 2.8.3 predates that bootstrap code. Bump once
  # upstream fixes the ordering (watch screepsmod-auth releases).
  - screepsmod-auth@2.8.3
  - screepsmod-admin-utils

bots: {}

extraPackages: {}

env:
  shared:
    MONGO_HOST: mongo
    MONGO_PORT: 27017
    REDIS_HOST: redis
    REDIS_PORT: 6379
  backend:
    CLI_HOST: 0.0.0.0
    CLI_PORT: 21026
